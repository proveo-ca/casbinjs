name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  check:
    uses: ./.github/workflows/_check.yml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - uses: ./.github/actions/setup

      - name: Build
        run: pnpm build

      - name: Pack
        run: pnpm -r pack --out-dir /tmp/tarballs

      - name: Upload tarballs
        uses: actions/upload-artifact@v4
        with:
          name: tarballs
          path: /tmp/tarballs/*.tgz

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Download tarballs
        uses: actions/download-artifact@v4
        with:
          name: tarballs
          path: /tmp/tarballs

      - name: Publish
        run: for f in /tmp/tarballs/*.tgz; do npm publish "$f" --access public --provenance; done
